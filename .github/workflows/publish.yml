name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.0)'
        required: true
        type: string
      publish_gen:
        description: 'Also publish native_workmanager_gen'
        required: true
        type: boolean
        default: true
      create_release:
        description: 'Create GitHub release after publishing'
        required: true
        type: boolean
        default: true

jobs:
  # ── Pre-flight checks ────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true

      - name: Verify plugin version matches input
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [[ "$PUBSPEC_VERSION" != "${{ inputs.version }}" ]]; then
            echo "❌ pubspec.yaml version ($PUBSPEC_VERSION) ≠ requested (${{ inputs.version }})"
            exit 1
          fi
          echo "✅ Version match: $PUBSPEC_VERSION"

      - name: Verify gen version matches input (if publishing gen)
        if: ${{ inputs.publish_gen }}
        run: |
          GEN_VERSION=$(grep '^version:' native_workmanager_gen/pubspec.yaml | awk '{print $2}')
          if [[ "$GEN_VERSION" != "${{ inputs.version }}" ]]; then
            echo "❌ native_workmanager_gen version ($GEN_VERSION) ≠ requested (${{ inputs.version }})"
            exit 1
          fi
          echo "✅ Gen version match: $GEN_VERSION"

      - name: Get dependencies
        run: flutter pub get

      - name: Override gen dependency to local path (for dry-run)
        if: ${{ inputs.publish_gen }}
        run: printf 'dependency_overrides:\n  native_workmanager:\n    path: ..\n' > native_workmanager_gen/pubspec_overrides.yaml

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Unit tests
        run: flutter test test/unit/

      - name: Publish dry-run (plugin)
        run: dart pub publish --dry-run

      - name: Publish dry-run (gen)
        if: ${{ inputs.publish_gen }}
        working-directory: native_workmanager_gen
        run: dart pub publish --dry-run

  # ── Publish plugin ────────────────────────────────────────────────────────────
  publish-plugin:
    name: Publish native_workmanager
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight
    permissions:
      id-token: write   # Required for OIDC-based pub.dev auth
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Setup pub credentials (fallback when OIDC not configured)
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          if [ -n "$PUB_CREDENTIALS" ]; then
            mkdir -p ~/.pub-cache
            echo "$PUB_CREDENTIALS" > ~/.pub-cache/credentials.json
          fi

      - name: Publish plugin
        run: dart pub publish --force

  # ── Publish gen ───────────────────────────────────────────────────────────────
  publish-gen:
    name: Publish native_workmanager_gen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: publish-plugin
    if: ${{ inputs.publish_gen }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true

      - name: Get dependencies (plugin — needed as path dep during local dev)
        run: flutter pub get

      - name: Get dependencies (gen)
        working-directory: native_workmanager_gen
        run: dart pub get

      - name: Setup pub credentials (fallback when OIDC not configured)
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          if [ -n "$PUB_CREDENTIALS" ]; then
            mkdir -p ~/.pub-cache
            echo "$PUB_CREDENTIALS" > ~/.pub-cache/credentials.json
          fi

      - name: Publish gen
        working-directory: native_workmanager_gen
        run: dart pub publish --force

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-plugin, publish-gen]
    if: inputs.create_release == true && needs.publish-plugin.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for v${{ inputs.version }}
        id: changelog
        run: |
          NOTES=$(awk '/^## \[${{ inputs.version }}\]/{found=1; next} /^## \[/{found=0} found{print}' CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"    >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            ## native_workmanager v${{ inputs.version }}

            Published to [pub.dev](https://pub.dev/packages/native_workmanager).

            ${{ steps.changelog.outputs.notes }}

            ---
            Also published: [native_workmanager_gen v${{ inputs.version }}](https://pub.dev/packages/native_workmanager_gen)
          draft: false
          prerelease: false
